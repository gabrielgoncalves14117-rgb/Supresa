<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pra Você ❤️</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: 20px;
            position: relative;
        }
        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff4d6d;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
        h1 {
            color: #c9184a;
            font-size: 28px;
            margin: 20px 0 10px 0;
        }
        .frase {
            font-size: 18px;
            color: #590d22;
            margin: 20px 0;
            line-height: 1.5;
        }
        .coracao {
            font-size: 40px;
            animation: pulsar 1.5s infinite;
        }
        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        /* Corações caindo */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .heart {
            position: absolute;
            font-size: 20px;
            animation: cair 6s linear infinite;
            opacity: 0.6;
        }
        @keyframes cair {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Corações caindo no fundo -->
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="coracao">❤️</div>
        <h1>Pra Maria Vitória</h1>
        
        <!-- TROCA O LINK DA FOTO AQUI -->
        <img src="mariavi4414_14050217_225744034.jpg" alt="Maria Vitória">
        
        <p class="frase">
            Você é perfeita Maria Vitória, fiz até essa programação pra você heheeh 💕
        </p>
        <p class="frase">
            Desde que te conheci, meu mundo ficou mais bonito. <br>
            Te amo! 
        </p>
        <div class="coracao">💖</div>
    </div>

    <script>
        // Cria corações caindo
        const heartsContainer = document.getElementById('hearts');
        const heartSymbols = ['❤️', '💖', '💕', '💗', '💓'];
        
        function criarCoracao() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heartsContainer.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        setInterval(criarCoracao, 300);
    </script>
</body>
</html>
