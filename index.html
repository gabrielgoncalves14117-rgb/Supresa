<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG Store FF - Passe Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a14;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        header {
            background: #0a0a14;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f1f3a;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #8b5cf6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '\f11b';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            background: #8b5cf6;
            padding: 8px;
            border-radius: 8px;
            font-size: 18px;
        }

        main {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        main h1 {
            font-size: 32px;
            color: #a78bfa;
            margin-bottom: 12px;
        }

        .subtitulo {
            color: #9ca3af;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .card {
            background: #151528;
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 30px 20px;
            margin-bottom: 20px;
        }

        .icone {
            background: #8b5cf6;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px auto;
            font-size: 26px;
        }

        .card h3 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card p {
            color: #9ca3af;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .link-contato {
            color: #a78bfa;
            font-weight: 600;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
        }

        .btn-whats {
            background: #25D366;
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }

        .preco {
            font-size: 28px;
            color: #00ff88;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KG STORE</div>
    </header>

    <main>
        <h1>Entre em Contato</h1>
        <p class="subtitulo">Passe Premium FF por R$ 6,99. Entrega em até 10min.</p>

        <div class="card">
            <div class="icone"><i class="fa-brands fa-whatsapp"></i></div>
            <h3>WhatsApp</h3>
            <p>Atendimento rápido e direto</p>
            <a href="https://wa.me/5577981047147?text=Quero%20o%20Passe%20de%206,99" class="btn-whats">Chamar no WhatsApp</a>
        </div>

        <div class="card">
            <div class="icone"><i class="fa-solid fa-envelope"></i></div>
            <h3>Email</h3>
            <p>Suporte para dúvidas</p>
            <a href="mailto:ktxgabriel13@gmail.com" class="link-contato">ktxgabriel13@gmail.com</a>
        </div>

        <div class="card">
            <div class="icone"><i class="fa-solid fa-tag"></i></div>
            <h3>Passe Premium</h3>
            <p>Produto em destaque</p>
            <div class="preco">R$ 6,99</div>
            <p>Pagamento via Pix</p>
        </div>
    </main>
</body>
</html>
