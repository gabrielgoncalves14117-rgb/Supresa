<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pra você ❤️</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .heart {
    position: fixed;
    color: #ff2d75;
    font-size: 20px;
    animation: fall 8s linear infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
  .container {
    position: relative;
    z-index: 2;
    max-width: 700px;
    text-align: center;
    background: rgba(20, 20, 20, 0.85);
    border: 2px solid rgba(255, 45, 117, 0.3);
    border-radius: 20px;
    padding: 40px 30px;
    box-shadow: 0 0 40px rgba(255, 45, 117, 0.4);
  }
  h1 {
    font-size: 2.5em;
    color: #ff4d8c;
    margin-bottom: 20px;
  }
  .fotos {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 30px 0;
  }
  .fotos img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    border: 3px solid #ff2d75;
  }
  .texto {
    background: rgba(255, 45, 117, 0.1);
    border-left: 4px solid #ff2d75;
    padding: 20px;
    margin: 25px 0;
    border-radius: 10px;
    line-height: 1.8;
    font-size: 1.1em;
    text-align: left;
  }
  .declaracao {
    font-size: 1.4em;
    color: #ff9ec7;
    font-weight: bold;
    padding: 25px;
    background: rgba(255, 45, 117, 0.15);
    border: 2px solid #ff2d75;
    border-radius: 15px;
    margin: 30px 0;
  }
  .botao {
    margin-top: 20px;
    padding: 15px 40px;
    background: linear-gradient(45deg, #ff2d75, #ff4d8c);
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 1.2em;
    cursor: pointer;
    font-family: 'Georgia', serif;
  }
  iframe { display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>Volta pra mim? ❤️</h1>
  
  <div class="fotos">
    <img src="foto1.jpg" alt="Nós dois">
    <img src="foto2.jpg" alt="Lembrança">
    <img src="foto3.jpg" alt="Você e eu">
  </div>
  
  <div class="texto">
    <p>Cole aqui o texto que você escreveu pra ela...</p>
  </div>
  
  <div class="declaracao">
    porfavor vamos tentar denovo com mais maturidade, demorei meses fazendo isso aqui pra vc.. vamos fazer dar certo ❤️
  </div>
  
  <button class="botao" id="btnMusica" onclick="tocarMusica()">🎵 Tocar Música</button>
  <button class="botao" onclick="alert('Te amo. Por favor volta ❤️')">Volta pra mim?</button>
</div>

<!-- Música do YouTube - I Wanna Be Yours -->
<iframe id="youtube" width="0" height="0" src="https://www.youtube.com/embed/FnT2m1BgKGI?autoplay=1&loop=1&playlist=FnT2m1BgKGI&controls=0" frameborder="0" allow="autoplay"></iframe>

<script>
  function criarCoracao() {
    const heart = document.createElement('div');
    heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = Math.random() * 3 + 5 + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
  }
  setInterval(criarCoracao, 250);

  function tocarMusica() {
    document.getElementById('youtube').style.display = 'block';
    document.getElementById('btnMusica').style.display = 'none';
  }
</script>

</body>
</html>
