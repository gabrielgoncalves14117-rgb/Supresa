<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pra você ❤️</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .heart {
    position: fixed;
    color: #ff2d75;
    font-size: 20px;
    animation: fall 8s linear infinite, blink 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .container {
    position: relative;
    z-index: 2;
    max-width: 700px;
    text-align: center;
    background: rgba(20, 20, 20, 0.85);
    border: 2px solid rgba(255, 45, 117, 0.3);
    border-radius: 20px;
    padding: 40px 30px;
    box-shadow: 0 0 40px rgba(255, 45, 117, 0.4);
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 40px rgba(255, 45, 117, 0.4); }
    50% { box-shadow: 0 0 60px rgba(255, 45, 117, 0.7); }
  }
  h1 {
    font-size: 2.5em;
    color: #ff4d8c;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .fotos {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 30px 0;
  }
  .fotos img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    border: 3px solid #ff2d75;
    transition: transform 0.3s;
  }
  .fotos img:hover { transform: scale(1.1) rotate(3deg); }
  .texto {
    background: rgba(255, 45, 117, 0.1);
    border-left: 4px solid #ff2d75;
    padding: 20px;
    margin: 25px 0;
    border-radius: 10px;
    line-height: 1.8;
    font-size: 1.1em;
    text-align: left;
  }
  .declaracao {
    font-size: 1.4em;
    text-align: center;
    color: #ff9ec7;
    font-weight: bold;
    padding: 25px;
    background: rgba(255, 45, 117, 0.15);
    border: 2px solid #ff2d75;
    border-radius: 15px;
    margin: 30px 0;
    animation: pulseCoracao 1.5s ease-in-out infinite;
  }
  @keyframes pulseCoracao {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 45, 117, 0.5); }
    50% { transform: scale(1.03); box-shadow: 0 0 35px rgba(255, 45, 117, 0.8); }
  }
  .botao {
    margin-top: 20px;
    padding: 15px 40px;
    background: linear-gradient(45deg, #ff2d75, #ff4d8c);
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 1.2em;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(255, 45, 117, 0.5);
    font-family: 'Georgia', serif;
  }
  .botao:hover { transform: scale(1.1); box-shadow: 0 8px 30px rgba(255, 45, 117, 0.8); }
</style>
</head>
<body>

<audio id="musica" loop>
  <source src="I Wanna Be Yours(MP3_160K).mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>Volta pra mim? ❤️</h1>
  
  <div class="fotos">
    <img src="foto1.jpg" alt="Nós dois">
    <img src="foto2.jpg" alt="Lembrança">
    <img src="foto3.jpg" alt="Você e eu">
  </div>
  
  <div class="texto">
    <p>Cole aqui o texto que você escreveu pra ela...</p>
  </div>
  
  <div class="declaracao">
    porfavor vamos tentar denovo com mais maturidade, demorei meses fazendo isso aqui pra vc.. vamos fazer dar certo ❤️
  </div>
  
  <button class="botao" id="btnMusica" onclick="tocarMusica()">🎵 Tocar "I Wanna Be Yours"</button>
  <button class="botao" onclick="alert('Te amo. Por favor volta ❤️')">Volta pra mim?</button>
</div>

<script>
  function criarCoracao() {
    const heart = document.createElement('div');
    heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = Math.random() * 3 + 5 + 's';
    heart.style.fontSize = Math.random() * 20 + 15 + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
  }
  setInterval(criarCoracao, 250);

  function tocarMusica() {
    const audio = document.getElementById('musica');
    audio.volume = 0.6;
    audio.play().then(() => {
      document.getElementById('btnMusica').style.display = 'none';
    }).catch(() => {
      alert('Música não encontrada. Coloca o arquivo I Wanna Be Yours(MP3_160K).mp3 na mesma pasta do site.');
    });
  }
</script>

</body>
</html>
